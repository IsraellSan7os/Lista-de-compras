<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Lista de compras quicklist</title>

    <link rel="stylesheet" href="style/index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <div class="container">

        <section class="img">
          <img src="img/Larke.svg" alt="" />
          <img src="img/quicklist.svg" alt="" />
        </section>

        <a href="">Voltar</a>
        <h1>Compras da semana</h1>

        <form action="#">
          <input type="text" placeholder="Adicione um novo item" />
          <input type="button" value="Adicionar item " />

          <ul>
            <li class="item">
              <label class="item-left">
                <input type="checkbox" />
                <span>Pão de forma</span>
              </label>

              <button class="item-delete">
                <img src="img/delete.png" alt="Excluir item" />
              </button>
            </li>
          </ul>
        </form>

        <footer>
          <img src="img/warning-circle-filled.png" alt="">
          <span>O item foi removido da lista</span>
          <img src="img/delete-small.png" alt="">
        </footer>
      </div>
    </div>
  </body>
</html>
